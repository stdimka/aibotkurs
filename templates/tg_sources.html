<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('tg_channels') }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f4f4f4;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f8f9fa; }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-delete { background: #e74c3c; color: white; }
        .btn-add {
            background: #27ae60;
            color: white;
            padding: 10px 20px;
        }
        input {
            padding: 10px;
            width: 300px;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 {{ t('tg_channels') }}</h1>
        <p>{{ t('tg_channels_description') | default('Добавляйте и удаляйте источники для парсинга.') }}</p>

        <div style="margin: 20px 0;">
            <input type="text" id="new-channel"
                   placeholder="{{ t('tg_channel_placeholder') | default('@channel_name') }}" />
            <button onclick="addChannel()" class="btn btn-add">{{ t('add') }}</button>
        </div>

        <table id="channels-table">
            <thead>
                <tr>
                    <th>{{ t('channel') }}</th>
                    <th>{{ t('actions') }}</th>
                </tr>
            </thead>
            <tbody id="channels-body">
                <!-- Заполняется динамически -->
            </tbody>
        </table>
    </div>

    <script>
        const currentLang = "{{ lang }}";

        async function loadChannels() {
            const tbody = document.getElementById('channels-body');
            tbody.innerHTML = `<tr><td colspan="2">${currentLang === "en" ? "Loading..." : "Загрузка..."}</td></tr>`;

            try {
                const response = await fetch('/api/v1/tg_sources');
                const channels = await response.json();

                let html = '';
                channels.forEach(ch => {
                    html += `
                        <tr>
                            <td><strong>${ch.name}</strong></td>
                            <td>
                                <button onclick="deleteChannel('${ch.name}')" class="btn btn-delete">
                                    ${currentLang === "en" ? "Delete" : "Удалить"}
                                </button>
                            </td>
                        </tr>`;
                });

                tbody.innerHTML = html || `<tr><td colspan="2" style="text-align:center; color:#95a5a6;">
                    ${currentLang === "en" ? "No channels added yet" : "Пока нет добавленных каналов"}
                </td></tr>`;
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="2">${currentLang === "en" ? "Loading error" : "Ошибка загрузки"}</td></tr>`;
            }
        }

        async function addChannel() {
            const input = document.getElementById('new-channel');
            const name = input.value.trim();

            if (!name) {
                alert(currentLang === "en" ? "Enter channel name" : "Введите название канала");
                return;
            }

            try {
                const response = await fetch('/api/v1/tg_sources', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name })
                });

                if (response.ok) {
                    alert(currentLang === "en" ? "Channel added!" : "Канал добавлен!");
                    input.value = '';
                    loadChannels();
                } else {
                    alert(currentLang === "en" ? "Add error" : "Ошибка добавления");
                }
            } catch (e) {
                alert(currentLang === "en" ? "Failed to add channel" : "Не удалось добавить канал");
            }
        }

        async function deleteChannel(name) {
            if (!confirm(currentLang === "en"
                ? `Delete channel "${name}"?`
                : `Удалить канал "${name}"?`)) return;

            try {
                const response = await fetch(`/api/v1/tg_sources/${name}`, { method: 'DELETE' });
                if (response.ok) {
                    alert(currentLang === "en" ? "Channel deleted" : "Канал удалён");
                    loadChannels();
                } else {
                    alert(currentLang === "en" ? "Delete error" : "Ошибка удаления");
                }
            } catch (e) {
                alert(currentLang === "en" ? "Failed to delete channel" : "Не удалось удалить канал");
            }
        }

        // Загрузка при открытии
        window.onload = loadChannels;
    </script>
</body>
</html>
