<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки бота</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f4f4; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }
        textarea { min-height: 120px; font-family: monospace; resize: vertical; }
        .btn-save {
            background: #27ae60;
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn-save:hover { background: #219653; }
        .success { color: #27ae60; margin-top: 10px; font-weight: bold; }
        .error { color: #e74c3c; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ Настройки бота</h1>

        <form id="settings-form">
            <label>Интервал парсинга (минуты)</label>
            <input type="number" id="parsing_interval" min="10" max="1440">

            <label>Максимум новостей с одного источника за запуск</label>
            <input type="number" id="max_news" min="5" max="50">

            <label>Ключевые слова для фильтрации (через запятую)</label>
            <textarea id="keywords" rows="4"></textarea>

            <label>System Prompt (промпт для ИИ)</label>
            <textarea id="system_prompt" rows="10"></textarea>

            <button type="button" onclick="saveSettings()" class="btn-save">💾 Сохранить настройки</button>
        </form>

        <div id="status"></div>
    </div>

    <script>
        async function loadSettings() {
            // Пока просто заполняем дефолтными значениями
            // В будущем можно добавить GET-запрос для загрузки из Redis
            document.getElementById('parsing_interval').value = 30;
            document.getElementById('max_news').value = 10;

            // Загружаем ключевые слова и промпт из Redis (через существующий механизм)
            const keywordsTextarea = document.getElementById('keywords');
            const promptTextarea = document.getElementById('system_prompt');

            // Для ключевых слов используем те, что уже есть
            keywordsTextarea.value = "python, ai, нейросеть, ИИ, startup, telegram, бот, fastapi, разработка, программирование";

            // Для промпта оставляем пустым — он подгрузится из Redis при сохранении
        }

        async function saveSettings() {
            const data = {
                parsing_interval_minutes: parseInt(document.getElementById('parsing_interval').value) || 30,
                max_news_per_source_per_run: parseInt(document.getElementById('max_news').value) || 10,
                keywords: document.getElementById('keywords').value
                    .split(',')
                    .map(k => k.trim())
                    .filter(k => k),
                system_prompt: document.getElementById('system_prompt').value.trim()
            };

            try {
                const response = await fetch('/admin/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                const statusDiv = document.getElementById('status');

                if (result.status === "success") {
                    statusDiv.innerHTML = '<span class="success">✅ Настройки успешно сохранены!</span>';
                } else {
                    statusDiv.innerHTML = '<span class="error">❌ Ошибка: ' + (result.message || 'Неизвестная ошибка') + '</span>';
                }
            } catch (e) {
                document.getElementById('status').innerHTML = '<span class="error">❌ Не удалось сохранить настройки. Проверьте соединение.</span>';
            }
        }

        // Загрузка при открытии страницы
        window.onload = loadSettings;
    </script>
</body>
</html>
