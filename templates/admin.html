<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Bot — Админка</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f4f4f4;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; margin-bottom: 8px; }
        .status { color: #27ae60; font-weight: bold; }
        .btn {
            padding: 12px 20px;
            margin: 8px 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background: #3498db; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-refresh { background: #95a5a6; color: white; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #2c3e50; }
        .success { color: #27ae60; font-weight: bold; }
        .pending { color: #f39c12; }
        .empty { color: #95a5a6; text-align: center; padding: 50px; font-style: italic; }
        .refresh-time { font-size: 13px; color: #7f8c8d; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI News Bot — Админ панель</h1>
        <p>Статус: <span class="status">Работает</span></p>

        <div style="margin: 25px 0 30px 0;">
            <a href="/tg_sources" class="btn btn-primary">📋 Управление TG-каналами</a>
            <a href="/site_sources" class="btn btn-primary">🌐 Управление сайтами</a>
            <button onclick="runPipeline()" class="btn btn-success">▶️ Запустить парсинг сейчас</button>
            <button onclick="loadRecentPosts()" class="btn btn-refresh">🔄 Обновить список</button>
        </div>

        <h2>Последние сгенерированные посты</h2>
        <table id="posts-table">
            <thead>
                <tr>
                    <th>Источник</th>
                    <th>Заголовок</th>
                    <th>Статус</th>
                    <th>Дата генерации</th>
                </tr>
            </thead>
            <tbody id="posts-body">
                <tr><td colspan="4" class="empty">Загрузка постов...</td></tr>
            </tbody>
        </table>

        <div class="refresh-time" id="last-update">Последнее обновление: —</div>
    </div>

    <script>
        async function runPipeline() {
            if (!confirm("Запустить полный цикл парсинга и публикации?")) return;

            const btn = event.target;
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = "Запускаем...";

            try {
                const response = await fetch('/admin/run_pipeline', { method: 'POST' });
                const data = await response.json();
                alert(data.status === "success" ? "✅ Пайплайн запущен в фоне!" : "❌ " + data.message);
                setTimeout(loadRecentPosts, 10000); // обновить через 10 секунд после запуска
            } catch (e) {
                alert("❌ Не удалось подключиться к серверу");
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        async function loadRecentPosts() {
            const tbody = document.getElementById('posts-body');
            tbody.innerHTML = '<tr><td colspan="4" class="empty">Загрузка...</td></tr>';

            try {
                const response = await fetch('/admin/recent_posts');
                const data = await response.json();

                if (data.posts && data.posts.length > 0) {
                    let html = '';
                    data.posts.forEach(post => {
                        const statusClass = post.status === 'Опубликовано' ? 'success' : 'pending';
                        html += `
                            <tr>
                                <td><strong>${post.source}</strong></td>
                                <td>${post.title}</td>
                                <td><span class="${statusClass}">${post.status}</span></td>
                                <td>${formatDate(post.generated_at)}</td>
                            </tr>`;
                    });
                    tbody.innerHTML = html;
                } else {
                    tbody.innerHTML = '<tr><td colspan="4" class="empty">Пока нет сгенерированных постов</td></tr>';
                }

                const now = new Date();
                document.getElementById('last-update').textContent =
                    `Последнее обновление: ${now.toLocaleTimeString('ru-RU')}`;
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty">Ошибка загрузки постов</td></tr>';
            }
        }

        function formatDate(dateStr) {
            if (!dateStr) return '—';
            try {
                const date = new Date(dateStr);
                return date.toLocaleString('ru-RU', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } catch (e) {
                return dateStr;
            }
        }

        // Автообновление каждые 20 минут (1200 секунд)
        setInterval(loadRecentPosts, 1200000);

        // Первая загрузка при открытии страницы
        window.onload = loadRecentPosts;
    </script>
</body>
</html>
